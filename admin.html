<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RickFLIX | Panel de Carga</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .admin-container { padding: 120px 5% 50px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #00cfd5; }
        input, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; 
            border: 1px solid #333; background: rgba(255,255,255,0.1); color: white;
            box-sizing: border-box;
        }
        .btn-upload { 
            background: #E50914; color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">RICKFLIX ADMIN</a>
        <a href="index.html" style="color: white; text-decoration: none;">🏠 Volver</a>
    </nav>

    <div class="admin-container">
        <h2>Subir Nuevo Contenido</h2>
        <form id="uploadForm">
            <div class="form-group">
                <label>Título de la Serie</label>
                <input type="text" id="vTitle" placeholder="Ej: Cenicienta y Miku" required>
            </div>
            <div class="form-group">
                <label>Nombre del archivo (Ej: Luna.mp4)</label>
                <input type="text" id="vFile" placeholder="Debe estar en carpeta Video/" required>
            </div>
            <div class="form-group">
                <label>Descripción corta</label>
                <textarea id="vDesc" rows="3"></textarea>
            </div>
            <button type="submit" class="btn-upload">🚀 Publicar Video</button>
        </form>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
